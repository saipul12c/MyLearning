[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Tell Netlify to ignore the secrets scanning for these intentionally public keys.
  # This prevents the build from failing even if these strings appear in the JS bundle.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_GEMINI_API_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
