[build]
  command = "npm run build"
  publish = ".next"

# Note: Environment variables like SECRETS_SCAN_OMIT_KEYS should be set 
# ONLY in the Netlify UI (Site Settings > Build & deploy > Environment variables)
# to avoid conflicts with the security scanner.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
